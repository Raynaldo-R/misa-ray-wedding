<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Construction</title>
<meta name="robots" content="noindex">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  font-size: 18px;
  line-height: 1.6;
  color: #111;
  background: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  text-align: center;
}
.construction-gif {
  display: block;
  width: min(280px, 80vw);
  height: auto;
  margin: 0 auto 28px;
  image-rendering: pixelated;
}
h1 {
  font-size: clamp(1.75rem, 5vw, 2.5rem);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .12em;
  margin-bottom: 16px;
}
p {
  color: #444;
  max-width: 36ch;
  margin: 0 auto 32px;
}
a {
  display: inline-block;
  color: #111;
  text-decoration: none;
  font-size: .8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .14em;
  padding: 14px 28px;
  border: 1px solid #111;
}
a:hover { background: #111; color: #fff; }
footer {
  text-align: center;
  padding: 24px;
  font-size: .85rem;
  color: #666;
  border-top: 1px solid #ddd;
}
</style>
</head>
<body>

<main>
  <div>
    <img
      class="construction-gif"
      src="https://blob.gifcities.org/gifcities/GLZOZTCLJSOHTREHAM34BBA7MNFABILP.gif"
      alt="Under construction"
      width="280"
      height="200">
    <h1>Under Construction</h1>
    <p>This page isn't ready yet. Please check back later.</p>
    <a href="/">Back to site</a>
  </div>
</main>

<footer>Under construction</footer>

</body>
</html>
